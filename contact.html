<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 | Ahova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { gold: "#C5A059", slate: "#0f172a" } },
                    fontFamily: {
                        sans: ["Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "sans-serif"],
                        serif: ["Noto Serif TC", "serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-slate text-slate-100 antialiased font-sans min-h-screen flex flex-col">
    <nav class="fixed top-0 left-0 w-full z-50 bg-brand-slate/85 backdrop-blur border-b border-white/10">
        <div class="max-w-6xl mx-auto px-6 h-24 flex items-center justify-between">
            <a href="index.html" class="font-serif text-3xl font-bold tracking-wider">Ahova<span class="text-brand-gold">.</span></a>
            <div class="hidden md:flex items-center gap-8 text-sm font-bold tracking-widest">
                <a class="hover:text-brand-gold" href="index.html">關於 Ahova</a>
                <a class="hover:text-brand-gold" href="products.html">產品介紹</a>
                <a class="hover:text-brand-gold" href="careers.html">人才招募</a>
                <a class="text-brand-gold" href="contact.html">聯絡我們</a>
            </div>
            <div class="hidden md:inline-flex px-5 py-2 border border-brand-gold/60 text-brand-gold rounded-full text-sm font-bold">Let's Talk</div>
        </div>
    </nav>

    <main class="flex-grow pt-36 pb-20 px-6">
        <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-14 items-start">
            <section>
                <p class="text-brand-gold font-bold tracking-[0.3em] uppercase text-xs mb-5">Get In Touch</p>
                <h1 class="font-serif text-5xl font-bold mb-6">開始對話</h1>
                <p class="text-slate-300 leading-relaxed text-lg mb-10">無論你想導入設備、建立通路合作、採訪品牌，或加入團隊，歡迎留下需求。我們會依照內容安排合適窗口回覆。</p>
                <div class="space-y-7 text-slate-300">
                    <div>
                        <h2 class="text-white font-bold mb-2">電子郵件</h2>
                        <p>contact@ahova.com 一般諮詢</p>
                        <p>b2b@ahova.com 商業合作</p>
                    </div>
                    <div>
                        <h2 class="text-white font-bold mb-2">營運總部</h2>
                        <p>Taipei, Taiwan</p>
                        <p class="text-sm text-slate-500">目前採預約制拜訪</p>
                    </div>
                </div>
            </section>

            <section class="bg-white/5 border border-white/10 rounded-[2rem] p-8 md:p-10">
                <form class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-5">
                        <label class="block">
                            <span class="block text-xs font-bold text-slate-400 tracking-widest mb-2">您的姓名 *</span>
                            <input required type="text" class="w-full rounded-lg bg-white/5 border border-white/10 px-4 py-3 text-white outline-none focus:border-brand-gold" placeholder="王小明">
                        </label>
                        <label class="block">
                            <span class="block text-xs font-bold text-slate-400 tracking-widest mb-2">公司或單位</span>
                            <input type="text" class="w-full rounded-lg bg-white/5 border border-white/10 px-4 py-3 text-white outline-none focus:border-brand-gold" placeholder="選填">
                        </label>
                    </div>
                    <label class="block">
                        <span class="block text-xs font-bold text-slate-400 tracking-widest mb-2">電子郵件 *</span>
                        <input required type="email" class="w-full rounded-lg bg-white/5 border border-white/10 px-4 py-3 text-white outline-none focus:border-brand-gold" placeholder="name@example.com">
                    </label>
                    <label class="block">
                        <span class="block text-xs font-bold text-slate-400 tracking-widest mb-2">諮詢類型 *</span>
                        <select required class="w-full rounded-lg bg-white/5 border border-white/10 px-4 py-3 text-white outline-none focus:border-brand-gold">
                            <option class="text-slate-900">B2B 設備導入</option>
                            <option class="text-slate-900">經銷與代理洽談</option>
                            <option class="text-slate-900">媒體採訪與公關</option>
                            <option class="text-slate-900">職缺與履歷投遞</option>
                            <option class="text-slate-900">其他事項</option>
                        </select>
                    </label>
                    <label class="block">
                        <span class="block text-xs font-bold text-slate-400 tracking-widest mb-2">訊息內容 *</span>
                        <textarea required rows="5" class="w-full rounded-lg bg-white/5 border border-white/10 px-4 py-3 text-white outline-none focus:border-brand-gold resize-none" placeholder="請簡短說明您的需求或專案內容"></textarea>
                    </label>
                    <button type="button" class="w-full rounded-xl bg-brand-gold text-brand-slate py-4 font-black tracking-widest hover:bg-yellow-500">送出訊息</button>
                </form>
            </section>
        </div>
    </main>

    <footer class="bg-[#0b1120] border-t border-white/5 py-8">
        <div class="max-w-6xl mx-auto px-6 text-center text-xs text-slate-500 font-bold tracking-widest">&copy; 2026 Ahova. All rights reserved. The Purity Standard.</div>
    </footer>
</body>
</html>
